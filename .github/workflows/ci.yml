name: CartSentry CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # Setup Python
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # Install exactly what pytest needs
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas pytest streamlit requests

    # Run tests using Python's module launcher to completely bypass path errors
    - name: Run Automated Pytest Suite
      run: |
        python -m pytest